<!DOCTYPE html>
<button onclick="earnGold()">💰 Altın Kazan</button>
<button onclick="heal()">❤️ İyileş</button>

<script>

let character = localStorage.getItem("character");
let health = 100;
let gold = 0;
let level = 1;
let power = 0;

if(character === "Savaşçı"){
power = 100;
}

if(character === "Büyücü"){
power = 70;
}

if(character === "Okçu"){
power = 80;
}


document.getElementById("character").innerText = "Karakterin: " + character;
document.getElementById("health").innerText = health;
document.getElementById("power").innerText = power;

function fight(){
health -= 10;
gold += 5;

if(health <= 0){
alert("Kaybettin!");
health = 100;
}

update();
}

function earnGold(){
 gold += 10;
 update();
}

function heal(){
health += 10;

if(health > 100){
health = 100;
}

update();
}

function update(){
if(gold >= 100){
level++;
gold = 0;
alert("Level Atladın!");
}

document.getElementById("gold").innerText = gold;
document.getElementById("level").innerText = level;
document.getElementById("health").innerText = health;
}

</script>

</body>
</html>
